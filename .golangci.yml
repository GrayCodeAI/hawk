version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - performance
        - style

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocritic
