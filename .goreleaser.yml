version: 2
project_name: hawk

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: hawk
    ldflags:
      - -s -w -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: GrayCodeAI
      name: homebrew-tap
    homepage: https://github.com/GrayCodeAI/hawk
    description: AI coding agent — reads, writes, and runs code in your terminal
    license: MIT
    install: |
      bin.install "hawk"
