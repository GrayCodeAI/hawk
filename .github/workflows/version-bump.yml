name: Version Bump

on:
  push:
    branches: [dev, main]

permissions:
  contents: write
  pull-requests: write

# Skip if the commit message is already a version bump (prevents cascade)
jobs:
  version-bump:
    name: Auto Version Bump
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine version bump type
        id: bump
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges -20)
          fi

          if echo "$COMMITS" | grep -qE "^feat!:" || echo "$COMMITS" | grep -qE "^BREAKING CHANGE"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE "^feat:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION=$(bun --eval "
            const [major, minor, patch] = '${CURRENT_VERSION}'.split('.').map(Number);
            const type = '${{ steps.bump.outputs.type }}';
            if (type === 'major') console.log(\`\${major + 1}.0.0\`);
            else if (type === 'minor') console.log(\`\${major}.\${minor + 1}.0\`);
            else console.log(\`\${major}.\${minor}.\${patch + 1}\`);
          ")
          {
            echo "current=${CURRENT_VERSION}"
            echo "new=${NEW_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.new }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Create version bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.version.outputs.new }}"
          branch: "chore/bump-version-${{ steps.version.outputs.new }}"
          base: ${{ github.ref_name }}
          title: "chore: bump version to ${{ steps.version.outputs.new }}"
          body: |
            Auto-generated version bump based on commits since last release.

            **Bump type:** ${{ steps.bump.outputs.type }}
            **Previous version:** ${{ steps.version.outputs.current }}
            **New version:** ${{ steps.version.outputs.new }}

            This PR will auto-merge if CI passes.
          labels: chore, automated
          delete-branch: true
