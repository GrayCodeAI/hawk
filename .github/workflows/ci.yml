name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hawk
    steps:
      - name: Checkout Hawk
        uses: actions/checkout@v4
        with:
          path: hawk

      - name: Checkout Eyrie (local dependency)
        uses: actions/checkout@v4
        with:
          repository: GrayCodeAI/eyrie
          path: eyrie

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Eyrie deps
        working-directory: eyrie
        run: npm ci

      - name: Install
        run: bun install

      - name: Build
        run: bun run build

      - name: Provider Tests
        run: bun run test:provider

      - name: Smoke
        run: bun run smoke
