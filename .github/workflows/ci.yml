name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hawk
    steps:
      - name: Checkout Hawk
        uses: actions/checkout@v5
        with:
          path: hawk

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build
        run: bun run build

      - name: Provider Tests
        run: bun run test:provider

      - name: Smoke
        run: bun run smoke
